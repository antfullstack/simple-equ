name: Auto Version Bump

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump patch version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read current version
        id: read_version
        run: |
          VERSION=$(python - <<'EOF'
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          EOF
          )
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute next patch version
        id: next_version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.read_version.outputs.current }}"
          NEXT_PATCH=$((PATCH + 1))
          echo "next=${MAJOR}.${MINOR}.${NEXT_PATCH}" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = "${{ steps.read_version.outputs.current }}"/version = "${{ steps.next_version.outputs.next }}"/' pyproject.toml

      - name: Commit and tag new version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version ${{ steps.read_version.outputs.current }} → ${{ steps.next_version.outputs.next }} [skip ci]"
          git tag "v${{ steps.next_version.outputs.next }}"
          git fetch origin main
          git rebase origin/main
          git push origin main --follow-tags

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
